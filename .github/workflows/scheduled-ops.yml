name: Scheduled Ops

on:
  schedule:
    # Drift detection — every 6 hours
    - cron: "0 */6 * * *"
    # Dependency updates — every Monday 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      job:
        description: Job to run
        type: choice
        options: [drift-detection, dependency-scan, cost-estimate, chaos-test]
        required: true

permissions:
  id-token: write
  contents: write
  pull-requests: write
  security-events: write

env:
  TERRAFORM_VERSION: "1.7.4"

jobs:
  # ─────────────────────────────────────────────
  # Terraform Drift Detection
  # ─────────────────────────────────────────────
  drift-detection:
    name: Drift Detection (${{ matrix.environment }})
    if: github.event.schedule == '0 */6 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'drift-detection')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, staging, prod]
    environment: ${{ matrix.environment }}-plan

    defaults:
      run:
        working-directory: terraform/environments/${{ matrix.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_ARN_{0}', upper(matrix.environment))] }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ matrix.environment }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Check for Drift
        id: drift
        run: |
          terraform plan -detailed-exitcode -no-color 2>&1 | tee drift.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT
          if [ $EXIT_CODE -eq 2 ]; then
            echo "drift_detected=true" >> $GITHUB_OUTPUT
            echo "::warning::⚠️ Drift detected in ${{ matrix.environment }}"
          fi

      - name: Notify Drift via Slack
        if: steps.drift.outputs.drift_detected == 'true'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "⚠️ *Infrastructure Drift Detected* in `${{ matrix.environment }}`\nView details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ─────────────────────────────────────────────
  # Dependency Scan & Auto-PR
  # ─────────────────────────────────────────────
  dependency-update:
    name: Dependency Scan
    if: github.event.schedule == '0 9 * * 1' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'dependency-scan')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Check outdated modules
        run: |
          go list -u -m -json all | go run golang.org/x/tools/cmd/godoc@latest 2>/dev/null || true
          go get -u ./...
          go mod tidy

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update Go dependencies"
          branch: chore/update-deps-${{ github.run_id }}
          title: "chore(deps): update Go module dependencies"
          body: |
            Automated dependency update generated by scheduled workflow.

            Changes:
            - Updated Go modules to latest compatible versions
            - Ran `go mod tidy`

            Please review the changes before merging.
          labels: dependencies,automated

  # ─────────────────────────────────────────────
  # Cloud Cost Estimation
  # ─────────────────────────────────────────────
  cost-estimate:
    name: Cost Estimate
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'cost-estimate'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate cost estimate
        run: |
          infracost breakdown \
            --path=terraform/ \
            --format=table \
            --out-file=cost-report.txt
          cat cost-report.txt

      - name: Upload cost report
        uses: actions/upload-artifact@v4
        with:
          name: cost-report
          path: cost-report.txt

  # ─────────────────────────────────────────────
  # Chaos Engineering
  # ─────────────────────────────────────────────
  chaos-test:
    name: Chaos Test (Staging)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'chaos-test'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_STAGING }} --region ${{ vars.AWS_REGION }}

      - name: Install Chaos Mesh CLI
        run: |
          curl -sSL https://mirrors.chaos-mesh.org/latest/install.sh | bash

      - name: Run chaos scenarios
        run: |
          # Pod failure test
          kubectl apply -f tests/chaos/pod-failure.yaml
          sleep 60
          kubectl delete -f tests/chaos/pod-failure.yaml

          # Network partition test
          kubectl apply -f tests/chaos/network-partition.yaml
          sleep 120
          kubectl delete -f tests/chaos/network-partition.yaml

          # CPU stress test
          kubectl apply -f tests/chaos/cpu-stress.yaml
          sleep 60
          kubectl delete -f tests/chaos/cpu-stress.yaml

      - name: Verify system recovery
        run: ./scripts/health-check.sh --slot=current --namespace=app-staging --timeout=300

name: Terraform Apply

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      image_tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to apply
        required: true
        type: choice
        options: [dev, staging, prod]
      destroy:
        description: Destroy infrastructure
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  TERRAFORM_VERSION: "1.7.4"
  TF_INPUT: "false"
  TF_IN_AUTOMATION: "true"

jobs:
  apply:
    name: Terraform Apply — ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}-apply

    defaults:
      run:
        working-directory: terraform/environments/${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_ARN_{0}', upper(inputs.environment))] }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: tf-apply-${{ inputs.environment }}-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}"

      - name: Download Plan
        if: "!inputs.destroy"
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: terraform/environments/${{ inputs.environment }}/

      - name: Terraform Apply
        if: "!inputs.destroy"
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: inputs.destroy == true
        run: terraform destroy -auto-approve

      - name: Export Outputs
        id: tf-outputs
        run: |
          terraform output -json > outputs.json
          echo "outputs=$(cat outputs.json | base64 -w0)" >> $GITHUB_OUTPUT
